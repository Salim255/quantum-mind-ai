version: "3.9"

name: quantum-mind-ai

services:

  ###########################################################
  # QDRANT VECTOR DATABASE
  ###########################################################
  quantum-mind-qdrant:
    image: qdrant/qdrant:latest

    container_name: quantum-mind-qdrant

    restart: always

    ports:
      - "6333:6333"

    ###########################################################
    # PERSIST VECTOR DATABASE DATA
    ###########################################################
    volumes:
      - quantum-mind-qdrant-data:/qdrant/storage

    ###########################################################
    # INTERNAL NETWORK
    ###########################################################
    networks:
      - quantum-mind-network


  ###########################################################
  # BACKEND (FASTAPI)
  ###########################################################
  quantum-mind-api:

    ###########################################################
    # START QDRANT BEFORE API
    ###########################################################
    depends_on:
      - quantum-mind-qdrant

    ###########################################################
    # BUILD LOCAL BACKEND IMAGE
    ###########################################################
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: quantum-mind-api

    restart: always

    ###########################################################
    # HOST:CONTAINER
    ###########################################################
    ports:
      - "8000:8000"

    ###########################################################
    # ENV VARIABLES
    ###########################################################
    env_file:
      - ./backend/.env

    ###########################################################
    # LIVE DEV MOUNT (OPTIONAL)
    ###########################################################
    volumes:
      - ./backend:/app

    ###########################################################
    # INTERNAL NETWORK
    ###########################################################
    networks:
      - quantum-mind-network


  ###########################################################
  # FRONTEND (ANGULAR)
  ###########################################################
  quantum-mind-client:

    ###########################################################
    # BUILD ANGULAR IMAGE
    ###########################################################
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: quantum-mind-client

    restart: always

    ports:
      - "3000:80"

    ###########################################################
    # INTERNAL NETWORK
    ###########################################################
    networks:
      - quantum-mind-network


#############################################################
# PERSISTENT VOLUMES
#############################################################
volumes:

  ###########################################################
  # QDRANT STORAGE
  ###########################################################
  quantum-mind-qdrant-data:


#############################################################
# SHARED NETWORK
#############################################################
networks:

  quantum-mind-network:
    driver: bridge